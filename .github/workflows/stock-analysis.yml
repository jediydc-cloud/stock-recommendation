name: Stock Analysis Auto Run

# 스케줄: 매일 평일 오전 8시 KST (UTC 기준 전날 23시)
on:
  schedule:
    - cron: '0 23 * * 0-4'  # 일~목 23:00 UTC = 월~금 08:00 KST

  # 수동 실행 (테스트용)
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      # 1. 저장소 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Python 환경 설정
      #    3.11: 3.10 대비 10~25% 빠름 / yfinance·pandas 호환성 우수
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3. 의존성 패키지 설치 (requirements.txt 단일 관리)
      #    제거된 패키지: matplotlib, Pillow, beautifulsoup4 (v1.2 미사용)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 한글 폰트 설치 생략
      #    v1.2는 HTML + JavaScript Canvas 차트 사용 → matplotlib 없음 → 폰트 불필요

      # 5. Python 스크립트 실행
      - name: Run stock analysis
        env:
          DART_API: ${{ secrets.DART_API }}
          swingTrading: ${{ secrets.swingTrading }}
        run: |
          python stock_swing_trading.py

      # 6. index.html 생성 및 이전 파일 정리
      - name: Clean old HTML files and create index
        run: |
          if ls stock_result_*.html 1> /dev/null 2>&1; then
            echo "📂 현재 HTML 파일 목록:"
            ls -lht stock_result_*.html

            # 최신 파일 찾기
            LATEST=$(ls -t stock_result_*.html | head -n 1)
            echo "✅ 최신 파일: $LATEST"

            # index.html로 복사 (GitHub Pages 메인 페이지)
            cp "$LATEST" index.html
            echo "📝 index.html 생성 완료"

            # 최신 파일 1개만 남기고 나머지 삭제
            echo "🧹 오래된 파일 삭제 중..."
            ls -t stock_result_*.html | tail -n +2 | xargs -r rm -v

            echo "✅ 정리 완료:"
            ls -lh stock_result_*.html index.html
          else
            echo "⚠️ HTML 파일이 없습니다. 스크립트 실행 로그를 확인하세요."
            exit 1
          fi

      # 7. 결과 파일 커밋 및 푸시
      - name: Commit and push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add *.html
          git add -u  # 삭제된 파일도 스테이징
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "Auto update: Stock analysis $(date +'%Y-%m-%d %H:%M:%S')"
          git push
